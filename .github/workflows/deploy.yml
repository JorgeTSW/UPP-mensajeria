name: Deploy UPP Mensajeria

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Desplegar via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Entrar a la carpeta o clonar si no existe
            if [ ! -d "~/proyecto-mensajeria" ]; then
              git clone https://github.com/JorgeTSW/UPP-mensajeria.git ~/proyecto-mensajeria
            fi
            cd ~/proyecto-mensajeria
            git pull origin main
            # Levantar el proyecto con Docker
            sudo docker compose up -d --build
